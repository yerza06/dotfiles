set-option -g prefix C-q
set -g mouse on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g base-index 1
setw -g pane-base-index 1

unbind %
bind -n M-'=' split-window -h
unbind '"'
bind -n M-'-' split-window -v

unbind c
bind -n M-Enter new-window
# bind-key W command-prompt "rename-window '%%'"
bind-key S command-prompt "new-session -s '%%'"

unbind '['
bind -n M-n next-window
bind -n M-p previous-window

bind -n M-1 select-window 1

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-h select-pane -L

bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R
bind -r C-h resize-pane -L

bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r H resize-pane -L 5

bind -r m resize-pane -Z
bind a display-popup

unbind v
bind v copy-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Status bar
set -g status-style bg=color0,fg=color7
set -g status-right "#[bg=color0,fg=color7] ν²≤#[bg=color7,fg=color0] %Y-%m-%d ν²≥ %H:%M ν²≥ #{battery_icon_status} #{battery_percentage} "
set -g status-interval 10
set -g status-right-length 50
set -g status-left "#[bg=color6,fg=color0] ν·à  #S #[bg=color0,fg=color6]ν²Α "
set -g status-left-length 50

# Window buttons
set -g renumber-windows on
set -g window-status-format "#[bg=color0,fg=color7]νÉ½#[bg=color7,fg=color0] #I ν²± #W #[bg=color0,fg=color7]ν²Α"
set -g window-status-current-format "#[bg=color0,fg=color2]νÉ½#[bg=color2,fg=color0 bold] #I ν²± #W #[bg=color0,fg=color2]ν²Α"

set -g status-justify left


# Pane separators
set -g pane-border-style fg=color8
set -g pane-border-lines double
set -g pane-active-border-style fg=color7

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @batt_icon_charge_tier8 'σΑ²¹'
set -g @batt_icon_charge_tier7 'σΑ²Ä'
set -g @batt_icon_charge_tier6 'σΑ¹Ω'
set -g @batt_icon_charge_tier5 'σΑ¹Ψ'
set -g @batt_icon_charge_tier4 'σΑ¹Ϋ'
set -g @batt_icon_charge_tier3 'σΑ¹Φ'
set -g @batt_icon_charge_tier2 'σΑ¹Μ'
set -g @batt_icon_charge_tier1 'σΑ¹Κ'
set -g @batt_icon_status_charged 'σ±àë'
set -g @batt_icon_status_charging 'σΑ²³'
set -g @batt_icon_status_discharging 'σΑ²É'
set -g @batt_color_status_primary_charged '#3daee9'
set -g @batt_color_status_primary_charging '#3daee9'

set -g @tmux-resurrect 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

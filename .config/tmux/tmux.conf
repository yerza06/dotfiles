set-option -g prefix C-q
set -g mouse on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g base-index 1
set -g history-limit 10000
setw -g pane-base-index 1

unbind %
bind -n M-'=' split-window -h
unbind '"'
bind -n M-'-' split-window -v

unbind c
bind -n M-Enter new-window
bind x kill-pane
bind X kill-window

bind-key S command-prompt "new-session -s '%%'"
bind-key R command-prompt "rename-session '%%'"

bind -n C-M-n next-window
bind -n C-M-p previous-window
bind M attach-session -t . -c "#{pane_current_path}"


unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -n C-M-1 select-window -t 1
bind -n C-M-2 select-window -t 2
bind -n C-M-3 select-window -t 3
bind -n C-M-4 select-window -t 4
bind -n C-M-5 select-window -t 5
bind -n C-M-6 select-window -t 6
bind -n C-M-7 select-window -t 7
bind -n C-M-8 select-window -t 8
bind -n C-M-9 select-window -t 9

bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R
bind -n C-M-h select-pane -L

bind -n M-J resize-pane -D 1
bind -n M-K resize-pane -U 1
bind -n M-L resize-pane -R 1
bind -n M-H resize-pane -L 1

bind -r C-k swap-pane -U
bind -r C-j swap-pane -D

bind -r C-h swap-window -t -1\; select-window -t -1
bind -r C-l swap-window -t +1\; select-window -t +1

bind -r m resize-pane -Z
bind B display-popup -w 80% -h 80% -E "btop"
bind H display-popup -w 80% -h 80% -E "htop"
bind G display-popup -w 80% -h 80% -E "lazygit"
bind D display-popup -w 80% -h 80% -E "lazydocker"
bind Y display-popup -w 80% -h 80% -E "spf"

unbind v
bind v copy-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Status bar
set -g status-style bg=color0,fg=color7
set -g status-right "#[bg=color0,fg=color7] î‚²#[bg=color7,fg=color0] %Y-%m-%d î‚³ %H:%M î‚³ #{battery_icon_status} #{battery_percentage} "
set -g status-interval 10
set -g status-right-length 70
set -g status-left "#[bg=color6,fg=color0] î¯ˆ #S | ïپ» #{session_path} #[bg=color0,fg=color6]î‚°"
set -g status-left-length 70

# Window buttons
set -g renumber-windows on
set -g window-status-format "#[bg=color0,fg=color7]îƒ—#[bg=color7,fg=color0] #I:#P î‚± #W #[bg=color0,fg=color7]î‚°"
set -g window-status-current-format "#[bg=color0,fg=color2]îƒ—#[bg=color2,fg=color0 bold] #I:#P î‚± #W #[bg=color0,fg=color2]î‚°"

set -g status-justify left


# Pane separators
set -g pane-border-style fg=color8
set -g pane-border-lines double
set -g pane-active-border-style fg=color7

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @batt_icon_charge_tier8 'َ°‚پ'
set -g @batt_icon_charge_tier7 'َ°‚€'
set -g @batt_icon_charge_tier6 'َ°پ؟'
set -g @batt_icon_charge_tier5 'َ°پ¾'
set -g @batt_icon_charge_tier4 'َ°پ½'
set -g @batt_icon_charge_tier3 'َ°پ¼'
set -g @batt_icon_charge_tier2 'َ°پ»'
set -g @batt_icon_charge_tier1 'َ°پ؛'
set -g @batt_icon_status_charged 'َ±ˆ‘'
set -g @batt_icon_status_charging 'َ°‚„'
set -g @batt_icon_status_discharging 'َ°‚ƒ'
set -g @batt_color_status_primary_charged '#3daee9'
set -g @batt_color_status_primary_charging '#3daee9'

set -g @tmux-resurrect 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
